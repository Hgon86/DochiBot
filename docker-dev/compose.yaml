services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: dochibot-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dochibot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dochibot123}
      POSTGRES_DB: ${POSTGRES_DB:-dochi_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dochibot} -d ${POSTGRES_DB:-dochi_bot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dochibot-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: dochibot-seaweedfs
    ports:
      - "8333:8333" # S3 API
      - "8888:8888" # Filer UI/API
      - "9333:9333" # Master UI/API
    volumes:
      - seaweedfs_data:/data
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    command: >
      server -dir=/data -s3 -s3.config /etc/seaweedfs/s3.json

  ollama:
    image: ollama/ollama:latest
    container_name: dochibot-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  cross-encoder:
    profiles: ["cross-encoder"]
    build:
      context: ..
      dockerfile: docker-dev/cross-encoder/Dockerfile
    container_name: dochibot-cross-encoder
    environment:
      CROSS_ENCODER_MODEL: ${CROSS_ENCODER_MODEL:-cross-encoder/ms-marco-MiniLM-L6-v2}
      CROSS_ENCODER_MAX_TEXT_CHARS: ${CROSS_ENCODER_MAX_TEXT_CHARS:-700}
      CROSS_ENCODER_MAX_CANDIDATES: ${CROSS_ENCODER_MAX_CANDIDATES:-50}
      CROSS_ENCODER_API_KEY: ${CROSS_ENCODER_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 20s
      timeout: 10s
      retries: 5

  api:
    profiles: ["api"]
    build:
      context: ..
      dockerfile: docker-dev/Dockerfile
    container_name: dochibot-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      AI_CHAT_PROVIDER: ${AI_CHAT_PROVIDER:-ollama}
      AI_EMBEDDING_PROVIDER: ${AI_EMBEDDING_PROVIDER:-ollama}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-dochi_bot}
      POSTGRES_USER: ${POSTGRES_USER:-dochibot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dochibot123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_BASE_URL: http://ollama:11434
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://opencode.ai/zen/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-glm-5-free}
      OPENAI_CHAT_COMPLETIONS_PATH: ${OPENAI_CHAT_COMPLETIONS_PATH:-/chat/completions}
      DOCHIBOT_RAG_RERANK_CROSS_ENCODER_ENDPOINT: ${DOCHIBOT_RAG_RERANK_CROSS_ENCODER_ENDPOINT:-http://cross-encoder:8001/rerank}
      DOCHIBOT_RAG_RERANK_CROSS_ENCODER_API_KEY: ${DOCHIBOT_RAG_RERANK_CROSS_ENCODER_API_KEY:-}
      S3_ENDPOINT: http://seaweedfs:8333
      S3_BUCKET: ${S3_BUCKET:-dochi-bot}
      S3_REGION: ${S3_REGION:-ap-northeast-2}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-s3admin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-s3secret}
      S3_PATH_STYLE_ACCESS: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_started
      ollama:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  seaweedfs_data:
  ollama_data:
